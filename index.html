<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0e27;color:#e0e6ff;line-height:1.6}
header{background:rgba(10,14,39,.95);padding:1rem 2rem;border-bottom:1px solid rgba(147,112,219,.1);position:sticky;top:0;z-index:100}
.h-content{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#9370db,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
section{max-width:1200px;margin:0 auto;padding:4rem 2rem}
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(10,14,39,1),rgba(20,25,60,.8)),radial-gradient(circle at 30% 50%,rgba(147,112,219,.15),transparent 50%);text-align:center}
.hero-content{max-width:700px}
h1{font-size:3.5rem;font-weight:800;margin-bottom:1.5rem;background:linear-gradient(135deg,#fff,#9370db,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2}
.subtext{font-size:1.1rem;color:#b0b8d4;margin-bottom:2rem;line-height:1.8}
.btn{display:inline-block;padding:.95rem 2.5rem;background:linear-gradient(135deg,#9370db,#6b5ccc);color:#fff;text-decoration:none;border-radius:8px;font-weight:600;border:none;cursor:pointer;transition:all .3s ease}
.btn:hover{background:linear-gradient(135deg,#a88edb,#7d6dd9);transform:translateY(-2px);box-shadow:0 10px 30px rgba(147,112,219,.3)}
h2{font-size:2.2rem;font-weight:700;margin-bottom:3rem;text-align:center;background:linear-gradient(135deg,#fff,#9370db);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.pain{background:linear-gradient(135deg,rgba(20,25,60,.5),rgba(30,40,80,.5));border-top:1px solid rgba(147,112,219,.1);border-bottom:1px solid rgba(147,112,219,.1)}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2rem;margin-top:2.5rem}
.card{padding:2rem;background:rgba(147,112,219,.05);border:1px solid rgba(147,112,219,.2);border-radius:8px;backdrop-filter:blur(10px)}
.card h3{color:#00d4ff;margin-bottom:.8rem;font-size:1.2rem}
.card p{color:#b0b8d4;font-size:.95rem}
.solution{background:rgba(10,14,39,1)}
.solution-text{text-align:center;color:#b0b8d4;max-width:700px;margin:0 auto 3rem;font-size:1.05rem}
.tiers{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.5rem;margin-top:2.5rem}
.tier{padding:1.5rem;background:linear-gradient(135deg,rgba(147,112,219,.1),rgba(0,212,255,.05));border:1px solid rgba(147,112,219,.3);border-radius:8px;text-align:center}
.tier h3{color:#00d4ff;margin-bottom:.5rem;font-size:1rem}
.tier p{color:#b0b8d4;font-size:.9rem}
.toolkit{background:linear-gradient(135deg,rgba(20,25,60,.5),rgba(30,40,80,.5));border-top:1px solid rgba(147,112,219,.1)}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:2rem;margin-top:2.5rem}
.feat{padding:2rem;background:rgba(147,112,219,.08);border:1px solid rgba(147,112,219,.25);border-radius:8px;backdrop-filter:blur(10px);transition:all .3s ease}
.feat:hover{background:rgba(147,112,219,.12);border-color:rgba(147,112,219,.4);transform:translateY(-4px)}
